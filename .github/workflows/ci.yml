name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compiler-tests:
    name: Compiler Tests (IR → Dart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Build CLI tools
        run: npm run build:cli && npm run build:verify

  visual-verification:
    name: Visual Verification (Claude AI)
    runs-on: ubuntu-latest
    needs: compiler-tests
    if: failure() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build verification CLI
        run: npm run build:verify

      - name: Run visual verification on failed goldens
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for ref in test/goldens/figma_ref/*_figma_ref.png; do
            [ -f "$ref" ] || continue
            name=$(basename "$ref" _figma_ref.png)
            golden="test/goldens/ci/${name}.png"
            if [ -f "$golden" ]; then
              echo "Verifying: $name"
              node dist/verify-visual.js "$ref" "$golden" --json > "verify_${name}.json" || true
            fi
          done

      - name: Post verification report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const globModule = require('@actions/glob');
            const reports = [];
            const globber = await globModule.create('verify_*.json');
            for await (const file of globber.globGenerator()) {
              try {
                const report = JSON.parse(fs.readFileSync(file, 'utf-8'));
                const name = require('path').basename(file).replace('verify_', '').replace('.json', '');
                reports.push({ name, ...report });
              } catch (_e) { /* skip invalid */ }
            }
            if (reports.length > 0) {
              let body = '## Visual Verification Report\n\n';
              for (const r of reports) {
                const icon = r.pass ? '✅' : '❌';
                body += `### ${icon} ${r.name} (${r.score}/10)\n`;
                if (r.differences?.length) {
                  body += '| Category | Severity | Description |\n|---|---|---|\n';
                  for (const d of r.differences) {
                    body += `| ${d.category} | ${d.severity} | ${d.description} |\n`;
                  }
                }
                body += '\n';
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  ir-validation:
    name: IR Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate all test fixtures
        run: npx vitest run test/ir/
